services:
  caddy:
    image: ${BT_CADDY_IMAGE:-code.bettercorp.dev/bettercorp/bettertunnels/caddy:latest}
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      APP_UPSTREAM: ${APP_UPSTREAM:-app}
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: udp
        mode: host
    volumes:
      - type: bind
        source: /opt/better-tunnels/app/Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        failure_action: rollback

  app:
    image: ${BSB_IMAGE:-code.bettercorp.dev/bettercorp/service-base:node-latest}
    environment:
      BSB_CONFIG_PLUGIN: ${BSB_CONFIG_PLUGIN:-config-vault}
      BSB_CONFIG_PLUGIN_PACKAGE: ${BSB_CONFIG_PLUGIN_PACKAGE:-@bsb/config-vault}
      BSB_PLUGIN_DIRS: /mnt/plugins
      BSB_SHOW_PACKAGES: ${BSB_SHOW_PACKAGES:-false}
      vaultUrl: ${vaultUrl}
      apiKeyId: ${apiKeyId}
      apiSecret: ${apiSecret}
    volumes:
      - bsb-plugins:/mnt/plugins
      - app-data:/data
    networks:
      - public
      - data
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback

  plugin-watcher:
    image: ${BSB_IMAGE:-code.bettercorp.dev/bettercorp/service-base:node-latest}
    environment:
      BSB_PLUGIN_DIRS: /mnt/plugins
      BSB_PLUGINS: ${BT_PACKAGE_SPEC:-@betterportal/tunnels@1.0}
      BSB_PLUGIN_UPDATE: "true"
      BSB_PLUGIN_WATCHER: "true"
      BSB_SHOW_PACKAGES: ${BSB_SHOW_PACKAGES:-false}
    volumes:
      - bsb-plugins:/mnt/plugins
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bettertunnels}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bettertunnels}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - bettertunnels-postgres:/var/lib/postgresql
    networks:
      - data
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager

networks:
  public:
    driver: overlay
    attachable: true
  data:
    driver: overlay
    attachable: true

volumes:
  bettertunnels-postgres:
    name: app_bettertunnels-postgres
    external: true
  caddy-data:
    name: app_caddy-data
    external: true
  caddy-config:
    name: app_caddy-config
    external: true
  app-data:
    name: app_bettertunnels-app-data
  bsb-plugins:
    name: app_bettertunnels-bsb-plugins
