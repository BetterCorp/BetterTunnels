services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    depends_on:
      - app
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  app:
    image: ${BSB_IMAGE:-code.bettercorp.dev/bettercorp/service-base:node-latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BSB_CONFIG_PLUGIN: ${BSB_CONFIG_PLUGIN:-config-vault}
      BSB_CONFIG_PLUGIN_PACKAGE: ${BSB_CONFIG_PLUGIN_PACKAGE:-@bsb/config-vault}
      BSB_PLUGIN_DIRS: /mnt/plugins
      BSB_SHOW_PACKAGES: ${BSB_SHOW_PACKAGES:-false}
      vaultUrl: ${vaultUrl}
      apiKeyId: ${apiKeyId}
      apiSecret: ${apiSecret}
    expose:
      - "8080"
      - "8081"
      - "8083"
    volumes:
      - bsb-plugins:/mnt/plugins
      - app-data:/data

  plugin-watcher:
    image: ${BSB_IMAGE:-code.bettercorp.dev/bettercorp/service-base:node-latest}
    environment:
      BSB_PLUGIN_DIRS: /mnt/plugins
      BSB_PLUGINS: ${BT_PACKAGE_SPEC:-@betterportal/tunnels@1.0}
      BSB_PLUGIN_UPDATE: "true"
      BSB_PLUGIN_WATCHER: "true"
      BSB_SHOW_PACKAGES: ${BSB_SHOW_PACKAGES:-false}
    volumes:
      - bsb-plugins:/mnt/plugins

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: bettertunnels
      POSTGRES_PASSWORD: bettertunnels
      POSTGRES_DB: bettertunnels
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bettertunnels -d bettertunnels"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - bettertunnels-postgres:/var/lib/postgresql

volumes:
  bettertunnels-postgres:
  bsb-plugins:
  app-data:
  caddy-data:
  caddy-config:
