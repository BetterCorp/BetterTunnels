services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    depends_on:
      - app
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://bettertunnels:bettertunnels@postgres:5432/bettertunnels?schema=public
      BSB_CONFIG_PLUGIN: ${BSB_CONFIG_PLUGIN:-config-vault}
      BSB_CONFIG_PLUGIN_PACKAGE: ${BSB_CONFIG_PLUGIN_PACKAGE:-@bsb/config-vault}
      vaultUrl: ${vaultUrl}
      apiKeyId: ${apiKeyId}
      apiSecret: ${apiSecret}
    expose:
      - "8080"
      - "8081"
      - "8083"

  migrate:
    build:
      context: .
      target: build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bettertunnels:bettertunnels@postgres:5432/bettertunnels?schema=public
      BSB_CONFIG_PLUGIN: ${BSB_CONFIG_PLUGIN:-config-vault}
      BSB_CONFIG_PLUGIN_PACKAGE: ${BSB_CONFIG_PLUGIN_PACKAGE:-@bsb/config-vault}
      vaultUrl: ${vaultUrl}
      apiKeyId: ${apiKeyId}
      apiSecret: ${apiSecret}
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: bettertunnels
      POSTGRES_PASSWORD: bettertunnels
      POSTGRES_DB: bettertunnels
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bettertunnels -d bettertunnels"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - bettertunnels-postgres:/var/lib/postgresql

volumes:
  bettertunnels-postgres:
  caddy-data:
  caddy-config:
