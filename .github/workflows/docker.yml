name: Caddy Container

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag, e.g. v0.1.0"
        required: true

permissions:
  contents: read

env:
  REGISTRY: code.bettercorp.dev
  IMAGE_NAME: bettercorp/bettertunnels/caddy

jobs:
  caddy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.BC_CODE_USER }}
          password: ${{ secrets.BC_CODE_PACKAGE_TOKEN }}
      - name: Validate tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
      - name: Build and push Caddy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.caddy
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag || github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://code.bettercorp.dev/BetterCorp/BetterTunnels
            org.opencontainers.image.description=BetterTunnels Caddy image with Cloudflare DNS challenge support
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy
