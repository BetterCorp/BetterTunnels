name: Docker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build locally in CI, e.g. v0.1.0"
        required: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: bettercorp/bettertunnels

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: app
            dockerfile: Dockerfile
          - image: caddy
            dockerfile: Dockerfile.caddy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - name: Validate tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.event.inputs.tag || github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
