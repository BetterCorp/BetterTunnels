name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.0"
        required: true

permissions:
  contents: write
  id-token: write

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: cli/go.sum
      - name: Validate release tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
      - run: npm ci
      - run: npm run check
      - run: go test ./...
        working-directory: cli
      - name: Build CLI binaries
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p dist/cli
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "${os}" = "windows" ]; then ext=".exe"; fi
            out="dist/cli/btunnel-${os}-${arch}${ext}"
            (cd cli && CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" go build -trimpath -ldflags="-s -w" -o "../${out}" .)
          done
          sha256sum dist/cli/* > dist/cli/SHA256SUMS
          (cd dist/cli && tar -czf "../../btunnel-${tag}.tar.gz" .)
          (cd dist/cli && zip -q -r "../../btunnel-${tag}.zip" .)
          sha256sum "btunnel-${tag}.tar.gz" "btunnel-${tag}.zip" > "btunnel-${tag}.sha256"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "${tag}" \
            --title "BetterTunnels ${tag}" \
            --notes "CLI release for ${tag}." \
            "btunnel-${tag}.tar.gz" \
            "btunnel-${tag}.zip" \
            "btunnel-${tag}.sha256"
