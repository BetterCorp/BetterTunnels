name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.1.0"
        required: true

permissions:
  contents: write
  id-token: write

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: cli/go.sum
      - name: Validate release tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
      - name: Set package version from tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          npm version "${tag#v}" --no-git-tag-version --allow-same-version
      - run: npm ci
      - run: npm run check
      - run: go test ./...
        working-directory: cli
      - name: Build CLI binaries
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          mkdir -p dist/cli
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "${os}" = "windows" ]; then ext=".exe"; fi
            out="dist/cli/btunnel-${os}-${arch}${ext}"
            (cd cli && CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "../${out}" .)
          done
          sha256sum dist/cli/* > dist/cli/SHA256SUMS
          (cd dist/cli && tar -czf "../../btunnel-${tag}.tar.gz" .)
          (cd dist/cli && zip -q -r "../../btunnel-${tag}.zip" .)
          sha256sum "btunnel-${tag}.tar.gz" "btunnel-${tag}.zip" > "btunnel-${tag}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: cli-release-assets
          path: |
            dist/cli
            btunnel-*.tar.gz
            btunnel-*.zip
            btunnel-*.sha256

  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Validate release tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
      - name: Set package version from tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          npm version "${tag#v}" --no-git-tag-version --allow-same-version
      - run: npm ci
      - run: npm run build
      - name: Fail if npm version already exists
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="${tag#v}"
          package_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")"
          if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
            echo "::error::${package_name}@${version} is already published."
            exit 1
          fi
      - name: Publish npm package
        run: npm publish --provenance --access public

  publish-bsb:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Validate release tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
      - name: Set package version from tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          npm version "${tag#v}" --no-git-tag-version --allow-same-version
      - run: npm ci
      - run: npm run build
      - name: Publish BSB registry metadata
        env:
          BSB_REGISTRY_TOKEN: ${{ secrets.BSB_REGISTRY_TOKEN }}
        run: |
          if [ -z "${BSB_REGISTRY_TOKEN}" ]; then
            echo "::error::Missing required repository secret: BSB_REGISTRY_TOKEN"
            exit 1
          fi
          npm run publish:client

  create-release:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          name: cli-release-assets
          path: release-assets
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" \
              release-assets/dist/cli/* \
              "release-assets/btunnel-${tag}.tar.gz" \
              "release-assets/btunnel-${tag}.zip" \
              "release-assets/btunnel-${tag}.sha256" \
              --clobber
          else
            gh release create "${tag}" \
              --title "BetterTunnels ${tag}" \
              --notes "CLI release for ${tag}." \
              release-assets/dist/cli/* \
              "release-assets/btunnel-${tag}.tar.gz" \
              "release-assets/btunnel-${tag}.zip" \
              "release-assets/btunnel-${tag}.sha256"
          fi
