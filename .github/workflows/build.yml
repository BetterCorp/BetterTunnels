name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: cli/go.sum
      - run: npm ci
      - run: npm run check
      - run: go test ./...
        working-directory: cli
      - name: Build CLI binaries
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          mkdir -p dist/cli
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "${os}" = "windows" ]; then ext=".exe"; fi
            out="dist/cli/btunnel-${os}-${arch}${ext}"
            (cd cli && CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" go build -trimpath -ldflags="-s -w -X main.version=${version}" -o "../${out}" .)
          done
          sha256sum dist/cli/* > dist/cli/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: btunnel-cli
          path: dist/cli/*
      - uses: actions/upload-artifact@v4
        with:
          name: bsb-plugin-lib
          path: lib/
