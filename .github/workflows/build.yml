name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build:cli
      - uses: actions/upload-artifact@v4
        with:
          name: btunnel-cli
          path: dist/btunnel.cjs
